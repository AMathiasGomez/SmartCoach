<div class="app-container">

  <header class="navbar">

      <div class="logo-icon">

      </div>
      <h2 class="logo-text">SmartCoach</h2>
    </div>

    <nav class="navbar-center">
      <a>Panel de Control</a>
      <a>Equipos</a>
      <a class="active">Jugadores</a>
      <a>Entrenamientos</a>
      <a>Partidos</a>
    </nav>

    <div class="navbar-right">
      <button class="icon-btn">
        <span class="material-symbols-outlined">notifications</span>
      </button>
      <div class="avatar">
        <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuBmvyAmGsUQW2mGy1v-UEsT89qG6BqVxQ-vVuyEEqVAEBwNm0gTg-I9ZUhI0JMZF1GdOpwKKVVBgdaHg8Eiu-DAxu7OLIt1h-C0cjvVU_o2u5syUmsaaie8CLv7IlmxCGzCOYZjkwKuz0O5nz0NlYKha-iTIlIFni274J-nRFOODXfHylkQfTF_710WWFH_H-9FBuRfc7TJObuKXHJmbA9_3cGkkT9-ijgMtAydzbskGQTvk1zRRyCevLkPROl_p771KhcGpscLQZ-q">
      </div>
    </div>
  </header>

  <main class="main-content">

    <section class="header-section">
      <h1>Registrar nuevo jugador</h1>
      <p>Complete el perfil técnico y personal para dar de alta al deportista.</p>
    </section>

    <section class="card">
      <h5><span class="material-symbols-outlined text-primary">person_add</span>Información del Jugador</h5>

      <form class="form">

        <div class="grid-2">
          <div class="form-group">
            <label>Nombre Completo</label>
            <input type="text" placeholder="Ej. Carlos Alcaraz" >
          </div>

          <div class="form-group">
            <label>Fecha de Nacimiento</label>
            <input type="date">
          </div>

          <div class="form-group">
            <label>Posición</label>
            <select>
              <option>Seleccionar</option>
            </select>
          </div>

          <div class="form-group">
            <label>Dorsal</label>
            <input type="number" placeholder="Ej. #11">
          </div>
        </div>

        <div class="form-group">
          <label>Equipo</label>
          <select></select>
        </div>

        <div class="form-group">
          <label>Notas</label>
          <textarea placeholder="Información médica, observaciones técnicas..."></textarea>
        </div>

        <div class="actions">
          <button type="button" class="btn-outline">Cancelar</button>
          <button type="submit" class="btn-primary">Guardar jugador</button>
        </div>

      </form>
    </section>

  </main>

</div>
