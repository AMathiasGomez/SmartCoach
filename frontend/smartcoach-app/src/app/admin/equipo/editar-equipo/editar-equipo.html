<div class="app-container">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="logo">
      <h3 class="logo-text">SmartCoach</h3>
      <p class="logo-subtext">GESTIÓN DEPORTIVA</p>
    </div>

    <nav>
      <a routerLink="/dashboard-admin"><span class="material-symbols-outlined">space_dashboard</span>Panel de
        Control</a>
      <a class="active" routerLink="/ver-equipos"><span class="material-symbols-outlined">group</span>Equipos</a>
      <a routerLink="/ver-jugadores"><span class="material-symbols-outlined">person</span>Jugadores</a>
      <a routerLink="/ver-entrenamientos"><span
          class="material-symbols-outlined">fitness_center</span>Entrenamientos</a>
      <a routerLink="/ver-partidos"><span class="material-symbols-outlined">sports_soccer</span>Partidos</a>
      <a routerLink="/ver-usuarios"><span class="material-symbols-outlined">emoji_people</span>Usuarios</a>
    </nav>

    <button class="logout" (click)="logout()">
      <span class="material-symbols-outlined logout-icon">logout</span>
      Cerrar sesión
    </button>

  </aside>

  <!-- CONTENIDO -->
  <main class="main-content">

    <section class="header-section">
      <h1>Editar equipo</h1>
      <p>Editar información del equipo.</p>
    </section>

    <section class="card">
      <h5><span class="material-symbols-outlined text-primary">person_add</span> Información del Equipo</h5>

      <div>

        <form class="form" (ngSubmit)="actualizarEquipo()">

          <div class="grid-2">
            <div class="form-group">
              <label>Nombre</label>
              <div class="input-container">
                <span class="material-symbols-outlined icon">badge</span>
                <input type="text" [(ngModel)]="equipo.nombre" name="nombre" placeholder="Ej. Halcones Black" required>
              </div>
            </div>

            <div class="form-group">
              <label>Año Fundacion</label>
              <div class="input-container">
                <span class="material-symbols-outlined">calendar_today</span>
                <input type="text" [(ngModel)]="equipo.ano_fundacion" name="ano_fundacion" placeholder="Ej. 1998"
                  required>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label>Categoria</label>
            <div class="input-container">
              <span class="material-symbols-outlined">date_range</span>
              <input type="text" [(ngModel)]="equipo.categoria" name="categoria" placeholder="Ej. Juvenil" required>
            </div>
          </div>

          <div class="form-group">
            <label>Descripcion</label>
            <textarea [(ngModel)]="equipo.descripcion" name="descripcion" placeholder="Descripción del equipo"
              required></textarea>
          </div>

          <div class="actions">
            <button type="button" class="btn-outline" (click)="router.navigate(['/ver-equipos'])">Cancelar</button>
            <button type="submit" class="btn-primary" (click)="router.navigate(['/ver-equipos'])">
              <span class="material-symbols-outlined">save</span>
              Guardar Equipo
            </button>
          </div>

        </form>

      </div>

    </section>

  </main>

</div>
