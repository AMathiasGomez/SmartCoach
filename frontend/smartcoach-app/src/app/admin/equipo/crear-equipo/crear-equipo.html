<div class="app-container">

  <aside class="sidebar">

    <div class="logo">
      <div class="logo-icon">
        <span class="material-symbols-outlined">sports_volleyball</span>
      </div>
      <h2 class="logo-text">SmartCoach</h2>
    </div>

    <nav>
      <a routerLink="/dashboard-admin"> Panel de Control</a>
      <a class="active" routerLink="/ver-equipos">Equipos</a>
      <a>Jugadores</a>
      <a>Entrenamientos</a>
      <a>Partidos</a>
    </nav>

    <button class="logout" (click)="logout()">
      <span class="material-symbols-outlined logout-icon">logout</span>
      Cerrar sesión
    </button>

  </aside>

  <main class="main-content">

    <section class="header-section">
      <h1>Registrar nuevo equipo</h1>
      <p>Complete el perfil técnico del equipo.</p>
    </section>

    <section class="card">
      <h5>
        <span class="material-symbols-outlined text-primary">person_add</span>
        Información del Equipo
      </h5>

      <form class="form" [formGroup]="form" (ngSubmit)="guardar()">

        <div class="grid-2">
          <div class="form-group">
            <label>Nombre</label>
            <div class="input-container">
              <span class="material-symbols-outlined icon">badge</span>
              <input type="text" placeholder="Ej. Halcones Black" formControlName="nombre">
            </div>
          </div>

          <div class="form-group">
            <label>Año Fundacion</label>
            <div class="input-container">
              <span class="material-symbols-outlined">calendar_today</span>
              <input type="text" placeholder="Ej. 1998" formControlName="ano_fundacion">
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>Categoria</label>
          <div class="input-container">
            <span class="material-symbols-outlined">date_range</span>
            <input type="text" placeholder="Ej. Juvenil" formControlName="categoria">
          </div>
        </div>

        <div class="form-group">
          <label>Descripcion</label>
          <textarea placeholder="Descripción del equipo a crear" formControlName="descripcion"></textarea>
        </div>

        <div class="actions">
          <button type="button" class="btn-outline" (click)="router.navigate(['/ver-equipos'])">
            Cancelar
          </button>

          <button type="submit" class="btn-primary">
            <span class="material-symbols-outlined">save</span>
            Guardar Equipo
          </button>
        </div>

      </form>
    </section>

  </main>

</div>
