<div class="app-container">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="logo">
            <h3 class="logo-text">SmartCoach</h3>
            <p class="logo-subtext">GESTIÓN DEPORTIVA</p>
        </div>

        <nav>
            <a routerLink="/dashboard-admin"><span class="material-symbols-outlined">space_dashboard</span>Panel
                deControl</a>
            <a routerLink="/ver-equipos"><span class="material-symbols-outlined">group</span>Equipos</a>
            <a class="active" routerLink="/ver-jugadores"><span
                    class="material-symbols-outlined">person</span>Jugadores</a>
            <a routerLink="/ver-entrenamientos"><span
                    class="material-symbols-outlined">fitness_center</span>Entrenamientos</a>
            <a routerLink="/ver-partidos"><span class="material-symbols-outlined">sports_soccer</span>Partidos</a>
            <a routerLink="/ver-usuarios"><span class="material-symbols-outlined">emoji_people</span>Usuarios</a>
        </nav>

        <button class="logout" (click)="logout()">
            <span class="material-symbols-outlined logout-icon">logout</span>
            Cerrar sesión
        </button>

    </aside>

    <!-- CONTENIDO -->
    <main class="main-content">

        <section class="header-section">
            <h1>Editar equipo</h1>
            <p>Editar información del equipo.</p>
        </section>

        <section class="card">
            <h5><span class="material-symbols-outlined text-primary">person_add</span> Información del Equipo</h5>

            <div>

                <form class="form" (ngSubmit)="actualizarJugador()">

                    <div class="grid-2">

                        <div class="form-group">
                            <label>Nombre Completo</label>
                            <input type="text" [(ngModel)]="jugador.nombre" name="nombre"
                                placeholder="Ej. Tomasz Fornal">
                        </div>

                        <div class="form-group">
                            <label>Fecha de Nacimiento</label>
                            <input type="date" [(ngModel)]="jugador.fecha_nacimiento" name="fecha_nacimiento">
                        </div>

                        <div class="form-group">
                            <label>Posición</label>
                            <select [(ngModel)]="jugador.posicion" name="posicion">
                                <option value="" disabled>Seleccionar</option>
                                <option value="Libero">Libero</option>
                                <option value="Punta">Punta</option>
                                <option value="Central">Central</option>
                                <option value="Opuesto">Opuesto</option>
                                <option value="Armador">Armador</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Dorsal</label>
                            <input type="number" [(ngModel)]="jugador.numero" name="numero">
                        </div>

                    </div>

                    <div class="form-group">
                        <label>Equipo</label>

                        <select [(ngModel)]="jugador.equipo_id" name="equipo_id" [disabled]="equipos.length === 0">
                            <option value="" disabled>Selecciona un equipo</option>
                            <option *ngFor="let equipo of equipos" [ngValue]="equipo.id"> {{ equipo.nombre }} </option>
                            <option *ngIf="equipos.length === 0" disabled>No hay equipos disponibles</option>
                        </select>
                    </div>

                    <div class="actions">
                        <button type="button" class="btn-outline" routerLink="/ver-jugadores">
                            Cancelar
                        </button>

                        <button type="submit" class="btn-primary">
                            Actualizar jugador
                        </button>
                    </div>

                </form>

            </div>

        </section>

    </main>

</div>
